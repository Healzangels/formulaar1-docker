services:
  formulaar1:
    container_name: formulaar1
    image: healzangels/formulaar1:v1.0.0
    # To build locally instead of pulling (e.g. testing a Dockerfile change
    # before tagging a release), comment out `image:` above and uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     FORMULAAR1_REF: v1.0.0
    restart: unless-stopped
    environment:
      - PUID=99                       # Unraid 'nobody'
      - PGID=100                      # Unraid 'users'
      - TZ=America/New_York
    ports:
      - "5000:5000"                   # AutoBrr points its "Sonarr" client here
    volumes:
      # Config - bind mount so edits don't require a rebuild/restart-cycle.
      - /mnt/user/appdata/formulaar1/appsettings.json:/app/appsettings.json
      # Media/downloads - SAME path mapping as qBittorrent & Sonarr so hardlinks work.
      - /mnt/user/data:/data
    networks:
      - cmacproxy

networks:
  cmacproxy:
    external: true
