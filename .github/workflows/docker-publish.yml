name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      formulaar1_ref:
        description: "Upstream Formulaar1 git ref to build (tag or branch)"
        required: false
        default: "v0.5.0"

env:
  IMAGE_NAME: healzangels/formulaar1
  # Default Formulaar1 fork ref baked into the image when this workflow isn't
  # triggered by a git tag. Bump when a new patched tag lands on the fork at
  # https://github.com/Healzangels/Formulaar1
  DEFAULT_FORMULAAR1_REF: v0.5.0-fix3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream Formulaar1 ref
        id: ref
        run: |
          if [ -n "${{ github.event.inputs.formulaar1_ref }}" ]; then
            echo "value=${{ github.event.inputs.formulaar1_ref }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Use the git tag (without refs/tags/) as the upstream ref so
            # tagging this repo v0.5.0 builds upstream v0.5.0.
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.DEFAULT_FORMULAAR1_REF }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            FORMULAAR1_REF=${{ steps.ref.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
